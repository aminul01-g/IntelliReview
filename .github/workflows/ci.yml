name: CI Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install ruff mypy pytest pytest-cov
          pip install -r requirements.txt

      - name: Lint with Ruff
        run: ruff check .

      - name: Type check with Mypy
        run: mypy .

      - name: Run Tests
        run: pytest --cov=api --cov=analyzer --cov=ml_models tests/

  build-and-push:
    needs: lint-and-test
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push Backend
        run: |
          docker build -t ghcr.io/${{ github.repository }}/backend:latest -f Dockerfile.backend .
          docker push ghcr.io/${{ github.repository }}/backend:latest

      - name: Build and Push Worker
        run: |
          docker build -t ghcr.io/${{ github.repository }}/worker:latest -f Dockerfile.worker .
          docker push ghcr.io/${{ github.repository }}/worker:latest

      - name: Build and Push Frontend
        run: |
          docker build -t ghcr.io/${{ github.repository }}/frontend:latest -f Dockerfile.frontend .
          docker push ghcr.io/${{ github.repository }}/frontend:latest
