version: '3.8'

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile.dev
    command: uvicorn api.main:app --host 0.0.0.0 --port 8000 --reload
    environment:
      - DEBUG=True
    volumes:
      - ./:/app
    ports:
      - "8000:8000"

  # Development database with exposed ports
  postgres:
    ports:
      - "5432:5432"

  mongodb:
    ports:
      - "27017:27017"

  redis:
    ports:
      - "6379:6379"
