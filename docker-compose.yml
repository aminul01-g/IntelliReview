version: '3.8'

services:
  # PostgreSQL Database (TimescaleDB — drop-in superset of PostgreSQL)
  postgres:
    image: timescale/timescaledb:latest-pg15
    container_name: intellireview_postgres
    environment:
      POSTGRES_USER: intellireview
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
      POSTGRES_DB: intellireview_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - intellireview_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U intellireview"]
      interval: 10s
      timeout: 5s
      retries: 5

  # MongoDB
  mongodb:
    image: mongo:7
    container_name: intellireview_mongodb
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD:-password}
    volumes:
      - mongodb_data:/data/db
    ports:
      - "27017:27017"
    networks:
      - intellireview_network
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis
  redis:
    image: redis:7-alpine
    container_name: intellireview_redis
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    networks:
      - intellireview_network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Dashboard (Frontend)
  dashboard:
    build:
      context: ./dashboard
      dockerfile: Dockerfile
    container_name: intellireview_dashboard
    ports:
      - "3000:80"
    networks:
      - intellireview_network
    restart: unless-stopped
    depends_on:
      - api

  # API Service
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: intellireview_api
    environment:
      - DEBUG=True
      - POSTGRES_USER=intellireview
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-password}
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_DB=intellireview_db
      - MONGODB_URL=mongodb://admin:${MONGO_PASSWORD:-password}@mongodb:27017
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - HUGGINGFACE_API_KEY=${HUGGINGFACE_API_KEY}
      - HUGGINGFACE_MODEL=${HUGGINGFACE_MODEL:-Qwen/Qwen2.5-Coder-7B-Instruct}
      # - OPENAI_API_KEY=${OPENAI_API_KEY}
      # - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - SECRET_KEY=${SECRET_KEY:-your-secret-key-change-in-production}
    ports:
      - "8000:8000"
    volumes:
      - ./:/app
      - api_logs:/app/logs
    depends_on:
      postgres:
        condition: service_healthy
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - intellireview_network
    restart: unless-stopped

  # Celery Worker (Disabled: Module api.celery_app missing and unused)
  # celery_worker:
  #   build:
  #     context: .
  #     dockerfile: Dockerfile
  #   container_name: intellireview_celery
  #   command: celery -A api.celery_app worker --loglevel=info
  #   environment:
  #     - POSTGRES_USER=intellireview
  #     - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-password}
  #     - POSTGRES_HOST=postgres
  #     - POSTGRES_PORT=5432
  #     - POSTGRES_DB=intellireview_db
  #     - MONGODB_URL=mongodb://admin:${MONGO_PASSWORD:-password}@mongodb:27017
  #     - REDIS_HOST=redis
  #     - REDIS_PORT=6379
  #     - CELERY_BROKER_URL=redis://redis:6379/0
  #     - CELERY_RESULT_BACKEND=redis://redis:6379/0
  #   volumes:
  #     - ./:/app
  #   depends_on:
  #     - redis
  #     - postgres
  #     - mongodb
  #   networks:
  #     - intellireview_network
  #   restart: unless-stopped

  # Analysis History Service (Go + GraphQL + TimescaleDB aggregation)
  analysis-history:
    build:
      context: ./services/analysis-history
      dockerfile: Dockerfile
    container_name: intellireview_analysis_history
    environment:
      - DATABASE_URL=postgresql://intellireview:${POSTGRES_PASSWORD:-password}@postgres:5432/intellireview_db
      - AGGREGATION_INTERVAL=5m
      - LOG_LEVEL=info
      - PORT=4000
    ports:
      - "4000:4000"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - intellireview_network
    restart: unless-stopped

  # Nginx Reverse Proxy
  nginx:
    image: nginx:alpine
    container_name: intellireview_nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - api
    networks:
      - intellireview_network
    restart: unless-stopped

volumes:
  postgres_data:
  mongodb_data:
  redis_data:
  api_logs:

networks:
  intellireview_network:
    driver: bridge
