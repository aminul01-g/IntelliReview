apiVersion: v1
kind: Namespace
metadata:
  name: intellireview

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: intellireview-api
  namespace: intellireview
spec:
  replicas: 3
  selector:
    matchLabels:
      app: intellireview-api
  template:
    metadata:
      labels:
        app: intellireview-api
    spec:
      containers:
      - name: api
        image: intellireview/api:latest
        ports:
        - containerPort: 8000
        env:
        - name: POSTGRES_HOST
          value: postgres-service
        - name: REDIS_HOST
          value: redis-service
        - name: MONGODB_URL
          value: mongodb://mongodb-service:27017
        resources:
          requests:
            memory: "512Mi"
            cpu: "500m"
          limits:
            memory: "1Gi"
            cpu: "1000m"
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 10
          periodSeconds: 5

---
apiVersion: v1
kind: Service
metadata:
  name: intellireview-api-service
  namespace: intellireview
spec:
  selector:
    app: intellireview-api
  ports:
  - protocol: TCP
    port: 80
    targetPort: 8000
  type: LoadBalancer